<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="halo" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#F5C260"/>
      <stop offset="55%" stop-color="#E89348"/>
      <stop offset="100%" stop-color="#4A1E5C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E08855"/>
      <stop offset="100%" stop-color="#7A3A2E"/>
    </linearGradient>
    <linearGradient id="curls" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0B2E"/>
      <stop offset="45%" stop-color="#3B1B5C"/>
      <stop offset="100%" stop-color="#0E5C8C"/>
    </linearGradient>
    <linearGradient id="splash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </linearGradient>
    <radialGradient id="butterfly" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5BC0EB"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </radialGradient>
  </defs>

  <!-- Background wash -->
  <rect width="800" height="1000" fill="#2D0E3F"/>

  <!-- Sun halo -->
  <circle cx="400" cy="350" r="320" fill="url(#halo)" opacity="0.85"/>

  <!-- Wild abstract curls cloud (back layer) -->
  <g fill="url(#curls)" opacity="0.95">
    <ellipse cx="240" cy="220" rx="170" ry="200"/>
    <ellipse cx="560" cy="220" rx="170" ry="200"/>
    <ellipse cx="400" cy="160" rx="220" ry="160"/>
    <ellipse cx="180" cy="380" rx="140" ry="170"/>
    <ellipse cx="620" cy="380" rx="140" ry="170"/>
  </g>

  <!-- Curl coils -->
  <g fill="none" stroke="#0E5C8C" stroke-width="6" opacity="0.6">
    <path d="M180 180 q40 -40 0 -80 q-40 -40 0 -80"/>
    <path d="M620 180 q-40 -40 0 -80 q40 -40 0 -80"/>
    <path d="M120 320 q-30 30 0 60 q30 30 0 60"/>
    <path d="M680 320 q30 30 0 60 q-30 30 0 60"/>
  </g>

  <!-- Paint drips -->
  <g fill="url(#splash)" opacity="0.85">
    <path d="M170 440 q5 80 -5 140 q15 -10 25 0 q-5 -70 -5 -140 z"/>
    <path d="M250 460 q3 90 -8 180 q12 -5 22 5 q-2 -90 -2 -185 z"/>
    <path d="M540 450 q-3 80 8 160 q-15 -8 -28 2 q5 -80 5 -160 z"/>
    <path d="M620 430 q-2 100 10 200 q-10 -3 -20 8 q-3 -100 -3 -200 z"/>
  </g>

  <!-- Face -->
  <g>
    <!-- Neck -->
    <path d="M340 600 L340 720 Q400 760 460 720 L460 600 Z" fill="url(#skin)"/>
    <!-- Face shape -->
    <ellipse cx="400" cy="490" rx="135" ry="170" fill="url(#skin)"/>
    <!-- Cheek highlight -->
    <ellipse cx="335" cy="520" rx="35" ry="22" fill="#FF6B35" opacity="0.35"/>
    <ellipse cx="465" cy="520" rx="35" ry="22" fill="#FF6B35" opacity="0.35"/>
    <!-- Eyebrows -->
    <path d="M335 445 q25 -10 50 -2" stroke="#1A0B2E" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M415 443 q25 -8 50 2" stroke="#1A0B2E" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Eyes (closed, lashes) -->
    <path d="M325 480 q35 12 70 0" stroke="#1A0B2E" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M405 480 q35 12 70 0" stroke="#1A0B2E" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Lashes -->
    <g stroke="#1A0B2E" stroke-width="2.5" stroke-linecap="round">
      <line x1="330" y1="478" x2="326" y2="468"/>
      <line x1="345" y1="486" x2="343" y2="475"/>
      <line x1="360" y1="488" x2="361" y2="476"/>
      <line x1="375" y1="486" x2="378" y2="475"/>
      <line x1="390" y1="480" x2="394" y2="468"/>
      <line x1="410" y1="478" x2="406" y2="468"/>
      <line x1="425" y1="486" x2="423" y2="475"/>
      <line x1="440" y1="488" x2="441" y2="476"/>
      <line x1="455" y1="486" x2="458" y2="475"/>
      <line x1="470" y1="480" x2="474" y2="468"/>
    </g>
    <!-- Nose -->
    <path d="M398 500 q-8 30 -3 55 q5 5 15 5 q10 0 15 -5 q5 -25 -3 -55" stroke="#7A3A2E" stroke-width="2.5" fill="none" opacity="0.65"/>
    <!-- Lips -->
    <path d="M360 605 q40 -18 80 0 q-15 18 -40 18 q-25 0 -40 -18 z" fill="#9B3060"/>
    <path d="M365 605 q35 -8 70 0" stroke="#5C1A3A" stroke-width="2" fill="none"/>
    <!-- Lip shine -->
    <ellipse cx="395" cy="612" rx="14" ry="3" fill="#E91E63" opacity="0.5"/>
  </g>

  <!-- Front curls cascading over forehead -->
  <g fill="url(#curls)">
    <ellipse cx="330" cy="350" rx="60" ry="90"/>
    <ellipse cx="470" cy="350" rx="60" ry="90"/>
    <ellipse cx="280" cy="430" rx="50" ry="100"/>
    <ellipse cx="520" cy="430" rx="50" ry="100"/>
    <circle cx="370" cy="370" r="38"/>
    <circle cx="430" cy="370" r="38"/>
  </g>

  <!-- Forehead curls (kiss curls) -->
  <g fill="none" stroke="#1A0B2E" stroke-width="8" stroke-linecap="round">
    <path d="M360 420 q-15 15 0 30 q15 15 0 30"/>
    <path d="M440 420 q15 15 0 30 q-15 15 0 30"/>
  </g>

  <!-- Big blue butterfly accent -->
  <g transform="translate(150,400) rotate(-15)">
    <path d="M0 0 q-50 -50 -90 -20 q-30 25 -10 60 q20 30 60 20 q30 -10 40 -20 z" fill="url(#butterfly)"/>
    <path d="M0 0 q-40 30 -80 30 q-20 0 -25 -25 q5 -25 35 -35 z" fill="#5BC0EB" opacity="0.85"/>
    <circle cx="-50" cy="-15" r="8" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="-70" cy="15" r="6" fill="#FFFFFF" opacity="0.45"/>
    <line x1="0" y1="0" x2="-90" y2="-30" stroke="#1A0B2E" stroke-width="2"/>
  </g>

  <!-- Small butterfly accent -->
  <g transform="translate(640,560) rotate(20) scale(0.55)">
    <path d="M0 0 q-50 -50 -90 -20 q-30 25 -10 60 q20 30 60 20 q30 -10 40 -20 z" fill="#C77DFF"/>
    <path d="M0 0 q-40 30 -80 30 q-20 0 -25 -25 q5 -25 35 -35 z" fill="#9B5DE5"/>
  </g>

  <!-- Earring -->
  <circle cx="265" cy="540" r="14" fill="#F5C260"/>
  <circle cx="535" cy="540" r="14" fill="#F5C260"/>

  <!-- Sparkles -->
  <g fill="#F5C260">
    <circle cx="110" cy="180" r="3"/>
    <circle cx="690" cy="200" r="4"/>
    <circle cx="80" cy="500" r="3"/>
    <circle cx="720" cy="480" r="3"/>
    <circle cx="60" cy="700" r="4"/>
    <circle cx="740" cy="720" r="3"/>
  </g>
</svg>
