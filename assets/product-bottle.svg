<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 500" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bottleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#F5C260"/>
      <stop offset="100%" stop-color="#E89348"/>
    </linearGradient>
    <linearGradient id="bottleShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Cap -->
  <rect x="115" y="40" width="70" height="60" rx="6" fill="#1A0B2E"/>
  <rect x="115" y="40" width="70" height="10" rx="3" fill="#3D1A4E"/>
  <!-- Neck -->
  <rect x="125" y="95" width="50" height="20" fill="url(#bottleGrad)"/>
  <!-- Body -->
  <path d="M90 120 Q80 130 80 160 L80 430 Q80 460 110 470 L190 470 Q220 460 220 430 L220 160 Q220 130 210 120 Z" fill="url(#bottleGrad)"/>
  <!-- Shine -->
  <path d="M90 120 Q80 130 80 160 L80 430 Q80 460 110 470 L130 470 L130 130 Z" fill="url(#bottleShine)"/>
  <!-- Label -->
  <rect x="95" y="200" width="110" height="180" rx="4" fill="#4A1E5C"/>
  <!-- Curl emblem on label -->
  <g transform="translate(150, 240) scale(0.5)" stroke="#FF6B35" stroke-width="8" fill="none" stroke-linecap="round">
    <path d="M0 -30 Q25 -30 25 -5 Q25 20 0 20 Q-25 20 -25 45"/>
  </g>
  <!-- Brand text -->
  <text x="150" y="320" text-anchor="middle" font-family="serif" font-weight="700" font-size="18" fill="#F5C260" letter-spacing="3">FROCURLS</text>
  <text x="150" y="345" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FFFFFF" letter-spacing="2" opacity="0.85">CURL ELIXIR</text>
  <text x="150" y="365" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#E89348" letter-spacing="1.5">8 FL OZ • 236 ML</text>
</svg>
